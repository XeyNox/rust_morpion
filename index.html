<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Tictictoe</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200&family=Roboto+Serif&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            width: 100vw;
            width: 100dvw;
            height: 100vw;
            height: 100dvh;
            color: #000000;
        }

        h1 {
            text-align: center;
        }

        #board {
            width: 375px;
            height: 375px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 5px;
        }


        .square {
            width: 120px;
            height: 120px;
            border: 1px solid #D3D3D3;
            background-color: #F5F5F5;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .square:hover {
            background-color: #FFFFE0;
        }

        #restartButton {
            display: block;
            height: 40px;
            width: 150px;
            background-color: #FFFFFF;
            border: 1px solid #000000;
            border-radius: 40px;
            font-size: 18px;
        }

        #restartButton:hover {
            background-color: #000000;
            color: #FFFFFF;
        }
    </style>

</head>
<body>
    
</body>
</html>
